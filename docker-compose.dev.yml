services:
  invoicer:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: invoicer_dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - invoicer-dev-network

  mongodb:
    image: mongo:7
    container_name: invoicer_mongodb_dev
    restart: unless-stopped
    ports:
      - "27017:27017"
    env_file:
      - .env
    volumes:
      - mongodb_dev_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/admin --quiet
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - invoicer-dev-network

  redis:
    image: redis:7-alpine
    container_name: invoicer_redis_dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - invoicer-dev-network

volumes:
  mongodb_dev_data:
  redis_dev_data:

networks:
  invoicer-dev-network:
    driver: bridge
